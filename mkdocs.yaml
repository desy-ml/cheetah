site_name: Cheetah
site_url: https://desy-ml.github.io/cheetah/
repo_name: desy-ml/cheetah
repo_url: https://github.com/desy-ml/cheetah
edit_uri: edit/master/docs/

theme:
  name: material
  logo: _static/logo.png
  favicon: _static/logo.png
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tooltips
    - navigation.expand
    - navigation.footer
    - navigation.instant.preview
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/weather-night
        name: Switch to light mode

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
      ignore: ["*.py", "*.json", "*.glb", ".gitignore"]
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            show_root_full_path: true
            show_object_full_path: false
            docstring_style: google

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - css/mkdocstrings.css

nav:
  - Welcome: index.md
  - Examples:
      - Simple: examples/simple.ipynb
      - Convert: examples/convert.ipynb
      - Optimize Speed: examples/optimize_speed.ipynb
      - Gradient-based: examples/gradientbased.ipynb
      - Including Metadata: examples/including_metadata.md
  - Getting Started:
      - Coordinate System: coordinate_system.md
  - API Reference:
      - Accelerator: accelerator.md
      - Converters: converters.md
      - LatticeJSON: latticejson.md
      - Particles: particles.md
      - Track Methods: track_methods.md
      - Utils: utils.md
